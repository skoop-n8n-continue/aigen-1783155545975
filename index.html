<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Hunter 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <h1>Dragon Hunter 3D</h1>
        <div class="character-selection">
            
            <div class="characters">
                <div class="character-option" id="char-girl" style="width: 250px; height: 100px; border-radius: 50px; display: flex; flex-direction: column; justify-content: center; align-items: center; background-color: #00b7af; color: white; cursor: pointer; box-shadow: 0 4px 6px rgba(0,0,0,0.3);">
                    
                    <span style="font-size: 1.5em; margin-top: 0; font-weight: bold;">start game</span>
                </div>
            </div>
        </div>
        <button id="start-btn" class="btn" style="display: none;" disabled>Start Game</button>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="screen">
        <canvas id="game-canvas"></canvas>

        <div id="minimap-container" class="hidden">
            <div id="minimap-player"></div>
            <div id="minimap-dragon"></div>
        </div>

        <div class="controls-container">
            <!-- D-pad -->
            <div class="d-pad">
                <button class="d-btn up" id="btn-forward">▲</button>
                <div class="d-pad-middle">
                    <button class="d-btn left" id="btn-left">◀</button>
                    <div class="d-center"></div>
                    <button class="d-btn right" id="btn-right">▶</button>
                </div>
                <button class="d-btn down" id="btn-backward">▼</button>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn" id="btn-shoot">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="white">
                        <path d="M22,12L18,8V11H10V13H18V16L22,12M6.5,10C7.33,10 8,10.67 8,11.5V14.5C8,15.33 7.33,16 6.5,16H3.5C2.67,16 2,15.33 2,14.5V11.5C2,10.67 2.67,10 3.5,10H6.5Z" />
                    </svg>
                </button>
                <button class="action-btn" id="btn-jump">
                    <svg viewBox="0 0 24 24" width="40" height="40" fill="white">
                        <path d="M14 6C14 7.1 13.1 8 12 8C10.9 8 10 7.1 10 6C10 4.9 10.9 4 12 4C13.1 4 14 4.9 14 6M11.4 16L9.4 22L7.6 21.4L9.2 16.4L6 14.5V11H7.8L10 12.5V8.5C10 7.7 10.6 7 11.4 7H12.6C13.4 7 14 7.7 14 8.5V13H18V14.8H14V11H12.5L11.4 16Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <h1>Game Over</h1>
        <p>You defeated the dragon!</p>
        <div class="game-over-buttons">
            <button id="restart-btn" class="btn">Restart Game</button>
            <button id="quit-btn" class="btn">Quit Game</button>
            <button id="leave-btn" class="btn">Leave Game</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
  <!-- skoop-prefetch -->
  <script src="./skoop-prefetch.js" defer></script>
</body>
</html>
