<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="manifest" href="./manifest.json">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dragon Hunter 3D</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Home Screen -->
    <div id="home-screen" class="screen active">
        <h1>Dragon Hunter 3D</h1>
        <div class="character-selection">
            <h2>Select Character</h2>
            <div class="characters">
                <div class="character-option" id="char-boy">
                    <div class="char-icon boy-icon"></div>
                    <span>Boy</span>
                </div>
                <div class="character-option" id="char-girl">
                    <div class="char-icon girl-icon"></div>
                    <span>Girl</span>
                </div>
            </div>
        </div>
        <button id="start-btn" class="btn" style="display: none;" disabled>Start Game</button>
    </div>

    <!-- Game UI -->
    <div id="game-ui" class="screen">
        <canvas id="game-canvas"></canvas>

        <div id="minimap-container" class="hidden">
            <div id="minimap-player"></div>
            <div id="minimap-dragon"></div>
        </div>

        <div class="controls-container">
            <!-- D-pad -->
            <div class="d-pad">
                <button class="d-btn up" id="btn-forward">▲</button>
                <div class="d-pad-middle">
                    <button class="d-btn left" id="btn-left">◀</button>
                    <div class="d-center"></div>
                    <button class="d-btn right" id="btn-right">▶</button>
                </div>
                <button class="d-btn down" id="btn-backward">▼</button>
            </div>

            <!-- Action Buttons -->
            <div class="action-buttons">
                <button class="action-btn" id="btn-shoot">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                        <path d="M12,2A10,10 0 0,0 2,12A10,10 0 0,0 12,22A10,10 0 0,0 22,12A10,10 0 0,0 12,2M12,4A8,8 0 0,1 20,12A8,8 0 0,1 12,20A8,8 0 0,1 4,12A8,8 0 0,1 12,4M12,11A1,1 0 0,0 11,12A1,1 0 0,0 12,13A1,1 0 0,0 13,12A1,1 0 0,0 12,11M12,7A5,5 0 0,0 7,12A5,5 0 0,0 12,17A5,5 0 0,0 17,12A5,5 0 0,0 12,7Z" />
                    </svg>
                </button>
                <button class="action-btn" id="btn-jump">
                    <svg viewBox="0 0 24 24" width="24" height="24" fill="white">
                        <path d="M13.5,5.5C13.5,6.33 12.83,7 12,7C11.17,7 10.5,6.33 10.5,5.5C10.5,4.67 11.17,4 12,4C12.83,4 13.5,4.67 13.5,5.5M9.8,8.9L7,23H9.1L10.5,15L11.8,19H15.8L15.3,17H13.4L11.5,10.6L12,10.5C13.5,10.5 15,11.4 16,12.7L17.4,11.2C16,9.4 13.9,8.5 11.8,8.5L9.8,8.9Z" />
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <!-- Game Over Screen -->
    <div id="game-over-screen" class="screen">
        <h1>Game Over</h1>
        <p>You defeated the dragon!</p>
        <div class="game-over-buttons">
            <button id="restart-btn" class="btn">Restart Game</button>
            <button id="quit-btn" class="btn">Quit Game</button>
            <button id="leave-btn" class="btn">Leave Game</button>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', function () {
        navigator.serviceWorker.register('./sw.js')
          .then(function (reg) { console.log('[PWA] SW registered:', reg.scope); })
          .catch(function (err) { console.warn('[PWA] SW registration failed:', err); });
      });
    }
  </script>
  <!-- skoop-prefetch -->
  <script src="./skoop-prefetch.js" defer></script>
</body>
</html>
